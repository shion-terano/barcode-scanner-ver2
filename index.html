<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バーコードスキャナ</title>
<style>
  body {
    margin: 0;
    background: #1a1a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: sans-serif;
    color: #fff;
    padding: 16px;
    box-sizing: border-box;
  }
  h2 {
    font-size: 16px;
    margin-bottom: 12px;
    text-align: center;
  }
  /* カメラ映像エリア：横長・縦を狭く */
  #interactive {
    width: 100%;
    max-width: 400px;
    height: 160px;
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    background: #000;
  }
  #interactive video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  #interactive canvas {
    display: none;
  }
  /* 中央に読み取りガイドライン */
  #scan-line {
    position: absolute;
    top: 50%;
    left: 5%;
    width: 90%;
    height: 2px;
    background: rgba(74, 222, 128, 0.8);
    transform: translateY(-50%);
    box-shadow: 0 0 6px rgba(74, 222, 128, 0.8);
  }
  #result {
    margin-top: 16px;
    font-size: 18px;
    font-weight: bold;
    color: #4ade80;
    text-align: center;
  }
  #status {
    font-size: 13px;
    color: #aaa;
    margin-top: 8px;
    text-align: center;
  }
  #error {
    font-size: 13px;
    color: #f87171;
    margin-top: 8px;
    text-align: center;
    white-space: pre-wrap;
  }
  #start-btn {
    margin-top: 16px;
    padding: 12px 24px;
    font-size: 16px;
    background: #4ade80;
    color: #000;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
</style>
</head>
<body>
<h2>📷 ISBNバーコードスキャナ</h2>
<button id="start-btn">📷 カメラを起動する</button>
<div id="interactive">
  <div id="scan-line" style="display:none"></div>
</div>
<div id="result"></div>
<div id="status"></div>
<div id="error"></div>

<script src="https://unpkg.com/@ericblade/quagga2/dist/quagga.min.js"></script>
<script>
  const resultEl = document.getElementById('result');
  const statusEl = document.getElementById('status');
  const errorEl = document.getElementById('error');
  const startBtn = document.getElementById('start-btn');
  const scanLine = document.getElementById('scan-line');
  let detected = false;

  startBtn.addEventListener('click', function() {
    detected = false;
    startBtn.style.display = 'none';
    statusEl.textContent = 'カメラを起動中...';
    errorEl.textContent = '';

    Quagga.init({
      inputStream: {
        name: 'Live',
        type: 'LiveStream',
        target: document.getElementById('interactive'),
        constraints: {
          facingMode: 'environment',
          // 横長・縦狭の解像度指定
          width: { ideal: 1280 },
          height: { ideal: 400 }
        }
      },
      decoder: {
        readers: ['ean_reader']
      }
    }, function(err) {
      if (err) {
        errorEl.textContent = 'エラー: ' + JSON.stringify(err, null, 2);
        startBtn.style.display = 'block';
        return;
      }
      Quagga.start();
      scanLine.style.display = 'block';
      statusEl.textContent = 'ISBNバーコードをカメラに向けてください';
    });

    Quagga.onDetected(function(data) {
      if (detected) return;
      if (!data || !data.codeResult || !data.codeResult.code) return;
      detected = true;

      const isbn = data.codeResult.code;
      resultEl.textContent = '取得したISBN: ' + isbn;
      statusEl.textContent = 'GASに送信中...';
      scanLine.style.display = 'none';
      Quagga.stop();

      if (window.opener) {
        window.opener.postMessage({ type: 'ISBN_SCANNED', isbn: isbn }, '*');
      }
      setTimeout(function() { window.close(); }, 1000);
    });
  });
</script>
</body>
</html>
